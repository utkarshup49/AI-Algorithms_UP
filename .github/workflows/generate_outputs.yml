name: Generate Outputs On Tag

on:
  push:
    tags:
      - '*'

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run output generator
        run: |
          python output_generator.py

      - name: Commit generated OUTPUTS.md
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout master
          git pull origin master
          git add OUTPUTS.md
          git commit -m "Auto-generate OUTPUTS.md for tag ${{ github.ref_name }}" || echo "No changes"
          git push origin master

      - name: Push changes
        run: |
          git push
